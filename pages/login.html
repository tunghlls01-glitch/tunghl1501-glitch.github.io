<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/login.css">
</head>

<body>
    <div class="login">
        <header class="header">
            <h1>Đăng nhập</h1>
        </header>
        <main class="main">
            <div class="divEmail">
                <label for="loginEmail">Email</label><br>
                <input type="email" id="loginEmail"><br>
            </div>
            <div class="divPassword">
                <label for="loginPassword">Mật khẩu</label><br>
                <input type="password" id="loginPassword"><br>
            </div>
            <p class="error_login" id="error_login"></p>
            <button class="buttonLogin" onclick="login()">Đăng nhập</button><br>
        </main>
        <footer class="footer">
            <p>Chưa có tài khoản?</p>
            <a href="http://127.0.0.1:5500/pages/register.html">Đăng ký ngay</a>
        </footer>
        <div class="status" id="status">
            <div class="card_success">
                <span>✅ đăng nhập Thành công</span>
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>

</html>
