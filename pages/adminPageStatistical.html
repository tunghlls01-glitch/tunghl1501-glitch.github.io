<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

                <a href="../pages/adminPageService.html">Quản lý dịch vụ</a>
                <a href="">Trang chủ</a>
                <a href="../pages/login.html" style="color: #F87171;">Đăng xuất</a>
            </div>
        </div>
        <div class="mainAdmin">
            <h1>Thống kê lịch tập</h1>
            <!-- div1 -->
            <div class="total">
                <div class="total_gym">
                    <h2>Tổng số lịch Gym</h2>
                    <p>0</p>
                </div>
                <div class="total_yoga">
                    <h2>Tổng số lịch Yoga</h2>

                </div>
                <div class="total_zumba">
                    <h2>Tổng số lịch Zumba</h2>
                    <p>0</p>
                </div>
                <div>

                </div>
                <div>

            <!-- div2 -->
            <div>
                <!-- bảng thống kê -->
            </div>
            <!-- div3 -->
            <div>
                <h2>Bộ lọc</h2>
                <div>
                    <label for="">Lớp học</label>
                    <select name="" id="">
                        <option value="">Tất cả</option>
                        <option value="">Gym</option>
                        <option value="">Yoga</option>
                        <option value="">Zumba</option>
                    </select>
                </div>
                <div>
                    <label for="">Email</label>
                    <input type="email" placeholder="Tìm theo email">
                </div>
                <div>
                    <label for="">Ngày</label>
                    <input type="date" placeholder="Tìm theo email">
                </div>
            </div>
            <!-- div4 -->
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Lớp học</th>
                            <th>Ngày tập</th>
                            <th>Khung giờ</th>

                            <th>Email</th>

                    <tbody>

                    </tbody>
                </table>
