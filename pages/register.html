<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/register.css">
</head>

<body>
    <div class="register">
        <header class="header">
            <h1>Đăng ký tài khoản</h1>
        </header>
        <main class="main">
            <div class="divName">
                <label for="userName">Họ và tên</label><br>
                <input type="text" id="userName"><br>
                <!-- hiển thị lỗi -->
                <p class="div_p" id="error_name"></p>
            </div>
            <div class="divEmail">
                <label for="userEmail">Email</label><br>
                <input type="email" id="userEmail"><br>
                <!-- hiển thị lỗi -->
                <p class="div_p" id="error_email"></p>
            </div>
            <div class="divPassword">
                <label for="password">Mật khẩu</label><br>
                <input type="password" id="password"><br>
                <!-- hiển thị lỗi -->
                <p class="div_p" id="error_password"></p>
            </div>
            <div class="divConfirmPassword">
                <label for="confirmPassword">Xác nhận mật khẩu</label><br>
                <input type="password" id="confirmPassword"><br>
                <!-- hiển thị lỗi -->
                <p class="div_p" id="error_confirmPassword"></p>
            </div>
            <button class="btnRegister" onclick="addlogin() ">Đăng ký</button>
        </main>
        <footer class="footer">
            <p>Đã có tài khoản?</p>
            <a href="http://127.0.0.1:5500/pages/login.html">Đăng nhập ngay</a>
        </footer>
        <div class="status" id="status">
            <div class="card_success">
                <span>✅ đăng ký Thành công</span>
            </div>
        </div>
    </div>
    <script src="../js/register.js"></script>
</body>

</html>
