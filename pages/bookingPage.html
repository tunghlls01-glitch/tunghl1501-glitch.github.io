<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookingPage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/bookingPage.css">
</head>

<body>
    <header>
        <div class="div_header">
            <h1>GYM MANAGEMENT</h1>
            <div class="div_a">
                <a href="../pages/homePage.html">Trang chủ</a>
                <a href="../pages/bookingPage.html">Lịch tập</a>
            </div>
        </div>
    </header>
    <main>
        <div class="banner">
            <h1>Quản lý lịch tập</h1>
            <button onclick="showForm()">Đặt lịch mới</button>
        </div>
        <table>
            <thead class="thead">
                <tr>
                    <th>Lớp học</th>
                    <th>Ngày tập</th>
                    <th>Khung giờ</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody class="tbody" id="tbody">
                <!-- thêm lịch -->
                <!-- <tr>
                    <td>GYM</td>
                    <td>2023-03-10</td>
                    <td>7:00 - 13:00</td>
                    <td>Nguyễn Anh Tùng</td>
                    <td>tunghlls01@gmail.com</td>
                    <td>
                        <button class="btnEdit">Sửa</button>
                        <button class="btnDelete">Xóa</button>
                    </td>
                </tr> -->
            </tbody>
        </table>
    </main>
    <!-- form đặt lịch -->
    <div class="formAdd" id="formAdd" style="display: none;">
        <div >
            <h1 id="formAdd_h1">Đặt lịch mới</h1>
        </div>
        <div class="classRooms">
            <label for="classRooms">Lớp học</label><br>
            <select id="classRooms">
                <option value="" disabled selected>Chọn lớp học</option>
                <option value="gym">Gym</option>
                <option value="yoga">Yoga</option>
                <option value="zumba">Zumba</option>
            </select>
        </div>
        <div class="date">
            <label for="date">Ngày</label><br>
            <input type="date" id="date">
        </div>
        <div class="addTime">
            <label for="time">Khung giờ</label><br>
            <select id="time">
                <option value="" disabled selected>Chọn khung giờ</option>
                <option value="07:00 - 09:00">07:00 - 09:00</option>
                <option value="09:00 - 11:00">09:00 - 11:00</option>
                <option value="13:00 - 15:00">13:00 - 15:00</option>
                <option value="17:00 - 19:00">17:00 - 19:00</option>
            </select>
        </div>
        <p id="error" style="color: red; display: none;">Lỗi</p>
        <div class="btn">
            <button id="btn_01" onclick="closeForm()" style="background-color: #6b7280;">Hủy</button>
            <button id="btn_02" onclick="addLists()" style="background-color: #3b82f6;">Lưu</button>
            <button id="btn_03" onclick="closeForm()" style="display: none; background-color: red;">Hủy</button>
            <button id="btn_04" onclick="saveBook()" style="display: none; background-color: blue;">Sửa</button>
        </div>
    </div>
    <!-- hiển thị xác nhận -->
     <div class="div_check" id="div_check" style="display: none;">
        <h1>Bạn có xác nhận muốn xóa không ?</h1>
        <button class="btn1" onclick="offForm()">Hủy</button>
        <button class="btn2" onclick="deleteBook(checkIndexID)">Xóa</button>
     </div>   
     <!-- phân trang -->
      <footer>
            <p>1</p>
      </footer>
    <script src="../js/bookingPage.js"></script>
</body>    

</html>
